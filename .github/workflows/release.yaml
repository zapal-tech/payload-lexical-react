name: Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Release package

    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Build package
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Publish to npm
        run: pnpm publish
